name: iOS Xcode Release

on:
  push:
    branches: [release/ios]
    paths:
      - "apps/mobile/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/ios-release.yml"
  workflow_dispatch:
    inputs:
      submit_to_testflight:
        description: "Upload IPA to TestFlight"
        required: false
        default: true
        type: boolean

concurrency:
  group: ios-xcode-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-submit:
    name: Build iOS with Xcode and submit to TestFlight
    runs-on: macos-15
    timeout-minutes: 90
    permissions:
      contents: read
    env:
      APP_SCHEME: mobile
      IOS_WORKSPACE: apps/mobile/ios/mobile.xcworkspace
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate iOS native project
        working-directory: apps/mobile
        run: pnpm exec expo prebuild --platform ios --non-interactive --clean

      - name: Install CocoaPods
        working-directory: apps/mobile/ios
        run: pod install --repo-update

      - name: Read bundle identifier
        run: |
          BUNDLE_IDENTIFIER="$(python3 - <<'PY'
          import json
          with open('apps/mobile/app.json', 'r', encoding='utf-8') as f:
              print(json.load(f)['expo']['ios']['bundleIdentifier'])
          PY
          )"
          echo "BUNDLE_IDENTIFIER=$BUNDLE_IDENTIFIER" >> "$GITHUB_ENV"

      - name: Install signing certificate and provisioning profile
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/build_certificate.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          PROFILE_PLIST="$RUNNER_TEMP/profile.plist"

          echo -n "$IOS_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          echo -n "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/"//g')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/"

          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$PROFILE_PLIST")
          TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print :TeamIdentifier:0" "$PROFILE_PLIST")

          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"
          echo "TEAM_ID=$TEAM_ID" >> "$GITHUB_ENV"

      - name: Archive app with Xcode
        run: |
          xcodebuild \
            -workspace "$IOS_WORKSPACE" \
            -scheme "$APP_SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/$APP_SCHEME.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            clean archive

      - name: Export IPA
        run: |
          EXPORT_OPTIONS_PLIST="$RUNNER_TEMP/ExportOptions.plist"
          EXPORT_PATH="$RUNNER_TEMP/build"
          IPA_PATH="$EXPORT_PATH/$APP_SCHEME.ipa"

          cat > "$EXPORT_OPTIONS_PLIST" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
            <dict>
              <key>method</key>
              <string>app-store</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>teamID</key>
              <string>${TEAM_ID}</string>
              <key>provisioningProfiles</key>
              <dict>
                <key>${BUNDLE_IDENTIFIER}</key>
                <string>${PROFILE_NAME}</string>
              </dict>
            </dict>
          </plist>
          EOF

          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/$APP_SCHEME.xcarchive" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS_PLIST"

          echo "IPA_PATH=$IPA_PATH" >> "$GITHUB_ENV"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ${{ env.IPA_PATH }}

      - name: Upload to TestFlight
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.submit_to_testflight }}
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: ${{ env.IPA_PATH }}
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}
